# Alembic config — schema migrations for the SPBSP backend.
# Run: cd backend && alembic upgrade head      (apply pending)
#      cd backend && alembic revision --autogenerate -m "describe change"
#      cd backend && alembic downgrade -1      (revert one step)

[alembic]
script_location = alembic
prepend_sys_path = .

# DATABASE_URL is read from env at runtime (alembic/env.py) — do NOT hardcode here.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
